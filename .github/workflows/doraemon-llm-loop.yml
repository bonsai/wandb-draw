name: Doraemon LLM Loop

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      max_iterations:
        description: 'Number of LLM iterations'
        required: false
        default: '5'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install wandb openai

    - name: Install Blender
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xz-utils libgl1 libglu1-mesa libxi6 libxrender1 libxxf86vm1 libegl1 libxkbcommon0
        wget -q https://mirrors.dotsrc.org/blender/release/Blender4.3/blender-4.3.2-linux-x64.tar.xz
        tar -xf blender-4.3.2-linux-x64.tar.xz
        echo "$GITHUB_WORKSPACE/blender-4.3.2-linux-x64" >> $GITHUB_PATH

    - name: Run LLM loop
      run: |
        python orchestrator.py
      env:
        DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        WANDB_MODE: offline
        MAX_ITERATIONS: ${{ github.event.inputs.max_iterations || '5' }}
        QWEN_MODEL: "qwen-vl-plus"

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: doraemon-llm-results
        path: |
          doraemon_gen_*.png
          generated_*.py
          wandb/
        retention-days: 30

    - name: Commit best result
      if: github.event_name != 'pull_request'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        BEST=$(ls doraemon_gen_*.png 2>/dev/null | tail -1)
        if [ -n "$BEST" ]; then
          git add $BEST
          git commit -m "chore: llm-loop best render [skip ci]" || echo "No changes"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
